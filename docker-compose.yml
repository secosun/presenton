services:
  # ========== 独立 Docling 服务镜像 ==========
  docling-service:
    build:
      context: .
      dockerfile: Dockerfile.docling
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        TORCH_EXTRA_INDEX: https://mirrors.aliyun.com/pytorch-wheels/cpu
    environment:
      - PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
      - TORCH_EXTRA_INDEX=https://mirrors.aliyun.com/pytorch-wheels/cpu
    networks:
      - presenton-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ========== 主应用镜像 (不含 docling) ==========
  production:
    # image: ghcr.io/presenton/presenton:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_OLLAMA: "false"
    ports:
      # You can replace 5000 with any other port number of your choice to run Presenton on a different port number.
      - "5000:80"
      # Required for Codex OAuth callback (OpenAI redirects browser directly to localhost:1455)
      - "1455:1455"
      # MCP Server for AI Agent integration (optional)
      - "8001:8001"
    volumes:
      - ./app_data:/app_data
    environment:
      - MIGRATE_DATABASE_ON_STARTUP=true
      - DOCLING_SERVICE_URL=http://docling-service:8001
      - CAN_CHANGE_KEYS=${CAN_CHANGE_KEYS}
      - LLM=${LLM}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_MODEL=${GOOGLE_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - CUSTOM_LLM_URL=${CUSTOM_LLM_URL}
      - CUSTOM_LLM_API_KEY=${CUSTOM_LLM_API_KEY}
      - CUSTOM_MODEL=${CUSTOM_MODEL}
      - CODEX_MODEL=${CODEX_MODEL}
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - EXTENDED_REASONING=${EXTENDED_REASONING}
      - TOOL_CALLS=${TOOL_CALLS}
      - DISABLE_THINKING=${DISABLE_THINKING}
      - WEB_GROUNDING=${WEB_GROUNDING}
      - DATABASE_URL=${DATABASE_URL}
      - DISABLE_ANONYMOUS_TRACKING=${DISABLE_ANONYMOUS_TRACKING}
      - COMFYUI_URL=${COMFYUI_URL}
      - COMFYUI_WORKFLOW=${COMFYUI_WORKFLOW}
      # 内网 OpenClaw 网关（无公网 IP 时填局域网 IP:端口；可用 .env 覆盖）
      - OPENCLAW_GATEWAY_BASE=${OPENCLAW_GATEWAY_BASE:-http://192.168.233.132:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-openclaw-distributed-dev-local-gateway-token}
      - NEXT_PUBLIC_OPENCLAW_GATEWAY_BASE=${NEXT_PUBLIC_OPENCLAW_GATEWAY_BASE:-http://192.168.233.132:18789}
      - NEXT_PUBLIC_OPENCLAW_GATEWAY_TOKEN=${NEXT_PUBLIC_OPENCLAW_GATEWAY_TOKEN:-openclaw-distributed-dev-local-gateway-token}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docling-service
    networks:
      - presenton-network

  production-gpu:
    # image: ghcr.io/presenton/presenton:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_OLLAMA: "false"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      # You can replace 5000 with any other port number of your choice to run Presenton on a different port number.
      - "5000:80"
      # Required for Codex OAuth callback (OpenAI redirects browser directly to localhost:1455)
      - "1455:1455"
    volumes:
      - ./app_data:/app_data
    environment:
      - MIGRATE_DATABASE_ON_STARTUP=true
      - DOCLING_SERVICE_URL=http://docling-service:8001
      - CAN_CHANGE_KEYS=${CAN_CHANGE_KEYS}
      - LLM=${LLM}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_MODEL=${GOOGLE_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - CUSTOM_LLM_URL=${CUSTOM_LLM_URL}
      - CUSTOM_LLM_API_KEY=${CUSTOM_LLM_API_KEY}
      - CUSTOM_MODEL=${CUSTOM_MODEL}
      - CODEX_MODEL=${CODEX_MODEL}
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - EXTENDED_REASONING=${EXTENDED_REASONING}
      - TOOL_CALLS=${TOOL_CALLS}
      - DISABLE_THINKING=${DISABLE_THINKING}
      - WEB_GROUNDING=${WEB_GROUNDING}
      - DATABASE_URL=${DATABASE_URL}
      - DISABLE_ANONYMOUS_TRACKING=${DISABLE_ANONYMOUS_TRACKING}
      - COMFYUI_URL=${COMFYUI_URL}
      - COMFYUI_WORKFLOW=${COMFYUI_WORKFLOW}
      - OPENCLAW_GATEWAY_BASE=${OPENCLAW_GATEWAY_BASE:-http://192.168.233.132:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-openclaw-distributed-dev-local-gateway-token}
      - NEXT_PUBLIC_OPENCLAW_GATEWAY_BASE=${NEXT_PUBLIC_OPENCLAW_GATEWAY_BASE:-http://192.168.233.132:18789}
      - NEXT_PUBLIC_OPENCLAW_GATEWAY_TOKEN=${NEXT_PUBLIC_OPENCLAW_GATEWAY_TOKEN:-openclaw-distributed-dev-local-gateway-token}
    depends_on:
      - docling-service
    networks:
      - presenton-network

  development:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        INSTALL_OLLAMA: "false"
    ports:
      - "5000:80"
      # Required for Codex OAuth callback (OpenAI redirects browser directly to localhost:1455)
      - "1455:1455"
      # MCP Server for AI Agent integration (optional, enabled when running start-mcp-server.sh)
      - "8001:8001"
    volumes:
      - .:/app
      - ./app_data:/app_data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CYPRESS_INSTALL_BINARY=0
      - MIGRATE_DATABASE_ON_STARTUP=true
      - DOCLING_SERVICE_URL=http://docling-service:8001
      - CAN_CHANGE_KEYS=${CAN_CHANGE_KEYS}
      - LLM=${LLM}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_MODEL=${GOOGLE_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - CUSTOM_LLM_URL=${CUSTOM_LLM_URL}
      - CUSTOM_LLM_API_KEY=${CUSTOM_LLM_API_KEY}
      - CUSTOM_MODEL=${CUSTOM_MODEL}
      - CODEX_MODEL=${CODEX_MODEL}
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - EXTENDED_REASONING=${EXTENDED_REASONING}
      - TOOL_CALLS=${TOOL_CALLS}
      - DISABLE_THINKING=${DISABLE_THINKING}
      - WEB_GROUNDING=${WEB_GROUNDING}
      - DATABASE_URL=${DATABASE_URL}
      - DISABLE_ANONYMOUS_TRACKING=${DISABLE_ANONYMOUS_TRACKING}
      - COMFYUI_URL=${COMFYUI_URL}
      - COMFYUI_WORKFLOW=${COMFYUI_WORKFLOW}
      - OPENCLAW_GATEWAY_BASE=${OPENCLAW_GATEWAY_BASE:-http://192.168.233.132:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-openclaw-distributed-dev-local-gateway-token}
      - NEXT_PUBLIC_OPENCLAW_GATEWAY_BASE=${NEXT_PUBLIC_OPENCLAW_GATEWAY_BASE:-http://192.168.233.132:18789}
      - NEXT_PUBLIC_OPENCLAW_GATEWAY_TOKEN=${NEXT_PUBLIC_OPENCLAW_GATEWAY_TOKEN:-openclaw-distributed-dev-local-gateway-token}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docling-service
    networks:
      - presenton-network

  development-gpu:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        INSTALL_OLLAMA: "false"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "5000:80"
      # Required for Codex OAuth callback (OpenAI redirects browser directly to localhost:1455)
      - "1455:1455"
    volumes:
      - .:/app
      - ./app_data:/app_data
    environment:
      - CYPRESS_INSTALL_BINARY=0
      - MIGRATE_DATABASE_ON_STARTUP=true
      - DOCLING_SERVICE_URL=http://docling-service:8001
      - CAN_CHANGE_KEYS=${CAN_CHANGE_KEYS}
      - LLM=${LLM}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_MODEL=${GOOGLE_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - CUSTOM_LLM_URL=${CUSTOM_LLM_URL}
      - CUSTOM_LLM_API_KEY=${CUSTOM_LLM_API_KEY}
      - CUSTOM_MODEL=${CUSTOM_MODEL}
      - CODEX_MODEL=${CODEX_MODEL}
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - EXTENDED_REASONING=${EXTENDED_REASONING}
      - TOOL_CALLS=${TOOL_CALLS}
      - DISABLE_THINKING=${DISABLE_THINKING}
      - WEB_GROUNDING=${WEB_GROUNDING}
      - DATABASE_URL=${DATABASE_URL}
      - DISABLE_ANONYMOUS_TRACKING=${DISABLE_ANONYMOUS_TRACKING}
      - COMFYUI_URL=${COMFYUI_URL}
      - COMFYUI_WORKFLOW=${COMFYUI_WORKFLOW}
      - OPENCLAW_GATEWAY_BASE=${OPENCLAW_GATEWAY_BASE:-http://192.168.233.132:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-openclaw-distributed-dev-local-gateway-token}
      - NEXT_PUBLIC_OPENCLAW_GATEWAY_BASE=${NEXT_PUBLIC_OPENCLAW_GATEWAY_BASE:-http://192.168.233.132:18789}
      - NEXT_PUBLIC_OPENCLAW_GATEWAY_TOKEN=${NEXT_PUBLIC_OPENCLAW_GATEWAY_TOKEN:-openclaw-distributed-dev-local-gateway-token}
